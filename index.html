<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream AFK Overlay Plein Écran</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background: #09090b; /* Force le fond sombre partout */
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- Effet d'ambiance plein écran élargi --- */
        .background-glow {
            position: absolute;
            width: 150%; /* Augmenté pour couvrir tout l'écran du téléphone */
            height: 150%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.18) 0%, rgba(9, 9, 11, 0) 65%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulseGlow 8s infinite ease-in-out;
            pointer-events: none;
        }

        /* --- Conteneur Principal --- */
        .afk-container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }

        h1 {
            font-size: 3.5rem; /* Légèrement ajusté pour les écrans de smartphones verticaux */
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #71717a;
        }

        .socials-bar {
            margin-top: 20px;
            display: flex;
            gap: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #a1a1aa;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag {
            font-size: 1.1rem;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="afk-container">
        <div class="status-badge">
            <span class="dot"></span>
            Stream en pause
        </div>

        <h1>Je reviens</h1>
        
        <p class="subtitle">Le live reprend dans quelques instants...</p>

        <div class="socials-bar">
            <div class="social-item"><span class="flag">🇫🇷</span> En Direct</div>
            <div class="social-item">🎬 YouTube</div>
            <div class="social-item">📱 TikTok</div>
        </div>
    </div>

</body>
</html>
