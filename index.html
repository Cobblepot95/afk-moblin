<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream AFK Force Fullscreen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: #09090b !important;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- LE FIX POUR MOBLIN --- */
        /* Ce conteneur va s'étendre de force sur toute la surface réelle de l'écran du téléphone, */
        /* même si Moblin limite la taille de la source navigateur. */
        .fullscreen-force {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw !important;
            height: 100vh !important;
            min-width: 100vi !important;
            min-height: 100vb !important;
            background: #09090b !important; /* Force le fond noir sur l'intégralité de l'écran du téléphone */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* --- Effet d'ambiance en arrière-plan --- */
        .background-glow {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(9, 9, 11, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulseGlow 8s infinite ease-in-out;
            pointer-events: none;
        }

        /* --- Conteneur du Texte --- */
        .afk-container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #71717a;
        }

        .socials-bar {
            margin-top: 20px;
            display: flex;
            gap: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #a1a1aa;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag {
            font-size: 1.1rem;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="fullscreen-force">
        <div class="background-glow"></div>

        <div class="afk-container">
            <div class="status-badge">
                <span class="dot"></span>
                Stream en pause
            </div>

            <h1>Je reviens</h1>
            
            <p class="subtitle">Le live reprend dans quelques instants...</p>

            <div class="socials-bar">
                <div class="social-item"><span class="flag">🇫🇷</span> En Direct</div>
                <div class="social-item">🎬 YouTube</div>
                <div class="social-item">📱 TikTok</div>
            </div>
        </div>
    </div>

</body>
</html>
