<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream AFK - Transparent avec Vague</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: transparent !important;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .afk-container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: transparent !important;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #ffffff;
            line-height: 1.1;
            /* Ajout de l'animation de vague sur le contour */
            animation: waveOutline 4s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #ffffff;
            opacity: 0.9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .socials-bar {
            margin-top: 10px;
            display: flex;
            gap: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag {
            font-size: 1.1rem;
        }

        /* Animation du point (en direct) */
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Nouvelle animation : Effet de vague fluide sur le contour de "Je reviens" */
        @keyframes waveOutline {
            0% {
                text-shadow: 
                    -4px 0px 8px rgba(56, 189, 248, 0.8), 
                    4px 0px 8px rgba(56, 189, 248, 0.1),
                    0 4px 10px rgba(0, 0, 0, 0.6);
            }
            50% {
                text-shadow: 
                    4px 0px 8px rgba(56, 189, 248, 0.1), 
                    -4px 0px 8px rgba(56, 189, 248, 0.8),
                    0 4px 10px rgba(0, 0, 0, 0.6);
            }
            100% {
                text-shadow: 
                    -4px 0px 8px rgba(56, 189, 248, 0.8), 
                    4px 0px 8px rgba(56, 189, 248, 0.1),
                    0 4px 10px rgba(0, 0, 0, 0.6);
            }
        }
    </style>
</head>
<body>

    <div class="afk-container">
        <div class="status-badge">
            <span class="dot"></span>
            Stream en pause
        </div>

        <h1>Je reviens</h1>
        
        <p class="subtitle">Le live reprend dans un instant</p>

        <div class="socials-bar">
            <div class="social-item"><span class="flag">🇫🇷</span> En Direct</div>
            <div class="social-item">🎬 YouTube</div>
            <div class="social-item">📱 TikTok</div>
        </div>
    </div>

</body>
</html>
