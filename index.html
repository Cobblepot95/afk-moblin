<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream AFK Transparent Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Le fond de la page est maintenant totalement transparent */
        html, body {
            background: transparent !important;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Effet d'ambiance lumineux (marche très bien sur fond transparent) */
        .background-glow {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.25) 0%, rgba(9, 9, 11, 0) 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulseGlow 8s infinite ease-in-out;
            pointer-events: none;
        }

        /* Bloc principal avec un léger effet de verre dépoli sombre pour détacher le texte du stream */
        .afk-container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px 40px;
            background: rgba(10, 10, 12, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.05rem;
            font-weight: 300;
            color: #e4e4e7;
        }

        .socials-bar {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #d4d4d8;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag {
            font-size: 1rem;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="afk-container">
        <div class="status-badge">
            <span class="dot"></span>
            Stream en pause
        </div>

        <h1>Je reviens</h1>
        
        <p class="subtitle">Le live reprend dans un instant</p>

        <div class="socials-bar">
            <div class="social-item"><span class="flag">🇫🇷</span> En Direct</div>
            <div class="social-item">🎬 YouTube</div>
            <div class="social-item">📱 TikTok</div>
        </div>
    </div>

</body>
</html>
