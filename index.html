<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream AFK Transparent Pur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Transparence absolue et totale sur tout le conteneur */
        html, body {
            background: transparent !important;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff; /* Écritures blanches */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Halo lumineux bleu subtil en arrière-plan */
        .background-glow {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.25) 0%, rgba(9, 9, 11, 0) 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulseGlow 8s infinite ease-in-out;
            pointer-events: none;
        }

        /* Conteneur de texte sans aucune boîte, sans bordure et sans fond gris */
        .afk-container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: transparent !important; /* Force la transparence totale */
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8); /* Ombre pour garder le texte lisible sur le live */
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }

        h1 {
            font-size: 3.8rem; /* Taille réajustée */
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #ffffff; /* Blanc pur */
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #ffffff; /* Blanc pur */
            opacity: 0.9;
        }

        .socials-bar {
            margin-top: 10px;
            display: flex;
            gap: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff; /* Blanc pur */
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag {
            font-size: 1.1rem;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="afk-container">
        <div class="status-badge">
            <span class="dot"></span>
            Stream en pause
        </div>

        <h1>Je reviens</h1>
        
        <p class="subtitle">Le live reprend dans un instant</p>

        <div class="socials-bar">
            <div class="social-item"><span class="flag">🇫🇷</span> En Direct</div>
            <div class="social-item">🎬 YouTube</div>
            <div class="social-item">📱 TikTok</div>
        </div>
    </div>

</body>
</html>
